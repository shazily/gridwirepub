_format_version: "2.1"
_transform: true

services:
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest
        paths:
          - /rest/v1/
    plugins:
      - name: cors

  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth
        paths:
          - /auth/v1/
    plugins:
      - name: cors
