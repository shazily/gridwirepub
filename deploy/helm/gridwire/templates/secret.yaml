{{- if not .Values.config.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gridwire.secretName" . }}
  labels:
    {{- include "gridwire.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $s := .Values.config.secrets }}
  SUPABASE_URL: {{ $s.SUPABASE_URL | quote }}
  SUPABASE_PUBLISHABLE_KEY: {{ $s.SUPABASE_PUBLISHABLE_KEY | quote }}
  SUPABASE_SERVICE_ROLE_KEY: {{ $s.SUPABASE_SERVICE_ROLE_KEY | quote }}
  FIELD_ENCRYPTION_KEY: {{ $s.FIELD_ENCRYPTION_KEY | quote }}
  WORKER_INGEST_TOKEN: {{ $s.WORKER_INGEST_TOKEN | quote }}
  # VITE_* mirror the SUPABASE_* values so the client build/runtime match.
  VITE_SUPABASE_URL: {{ $s.SUPABASE_URL | quote }}
  VITE_SUPABASE_PUBLISHABLE_KEY: {{ $s.SUPABASE_PUBLISHABLE_KEY | quote }}
{{- end -}}
