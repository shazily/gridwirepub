{{- if .Values.worker.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gridwire.fullname" . }}-worker
  labels:
    {{- include "gridwire.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: 1   # single poller — do NOT scale horizontally
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "gridwire.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "gridwire.image" (dict "root" . "repository" .Values.worker.image.repository "tag" .Values.worker.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PORTAL_URL
              value: "http://{{ include "gridwire.fullname" . }}-portal"
            - name: POLL_CRON
              value: {{ .Values.worker.pollCron | quote }}
            - name: HEALTH_PORT
              value: {{ .Values.worker.healthPort | quote }}
            - name: SFTP_SECRETS
              value: {{ .Values.worker.sftpSecrets | quote }}
          envFrom:
            - secretRef:
                name: {{ include "gridwire.secretName" . }}
          ports:
            - name: health
              containerPort: {{ .Values.worker.healthPort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.worker.healthPort }}
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.worker.healthPort }}
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: state
              mountPath: /data
            {{- with .Values.worker.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: state
          {{- if .Values.worker.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "gridwire.fullname" . }}-worker-state
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.worker.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.worker.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "gridwire.fullname" . }}-worker-state
  labels:
    {{- include "gridwire.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- with .Values.worker.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.worker.persistence.size }}
{{- end }}
{{- end -}}
