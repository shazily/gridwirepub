# Default values for the Gridwire Helm chart.
# Copy to a private my-values.yaml, override, and install:
#   helm install gridwire ./deploy/helm/gridwire -n gridwire --create-namespace -f my-values.yaml
# Upgrade later with:
#   helm upgrade gridwire ./deploy/helm/gridwire -n gridwire -f my-values.yaml

# -----------------------------------------------------------------------------
# Configuration passed to both portal and worker as environment variables.
# Provide these either inline here (NOT recommended for real secrets) or via an
# existing Kubernetes Secret (recommended — see `existingSecret`).
# -----------------------------------------------------------------------------
config:
  # Set to the name of a pre-created Secret to source ALL env vars from it.
  # Create it from your .env:
  #   kubectl -n gridwire create secret generic gridwire-env --from-env-file=.env
  # When set, the `secrets` block below is ignored.
  existingSecret: ""

  # Used only when existingSecret is empty. The chart renders a Secret from these.
  # NEVER commit real values — override at install time with -f or --set.
  secrets:
    SUPABASE_URL: ""
    SUPABASE_PUBLISHABLE_KEY: ""
    SUPABASE_SERVICE_ROLE_KEY: ""
    FIELD_ENCRYPTION_KEY: "" # 64 hex chars — keep stable across upgrades
    WORKER_INGEST_TOKEN: ""
    # VITE_* are injected automatically from the SUPABASE_* values above.

image:
  registry: ""            # e.g. "registry.your-company.com/" (trailing slash) or "" for Docker Hub
  pullPolicy: IfNotPresent
  pullSecrets: []         # e.g. [{ name: regcred }]

# -----------------------------------------------------------------------------
# Portal (web app + generated REST API). Stateless — scale freely.
# -----------------------------------------------------------------------------
portal:
  enabled: true
  image:
    repository: gridwire-portal
    tag: ""               # defaults to Chart.appVersion
  replicaCount: 2
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75
  # Probes hit the built-in liveness/readiness endpoints.
  livenessPath: /api/public/health
  readinessPath: /api/public/ready
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Worker (companion ingestion service). Single poller — do NOT scale > 1.
# -----------------------------------------------------------------------------
worker:
  enabled: true
  image:
    repository: gridwire-worker
    tag: ""               # defaults to Chart.appVersion
  pollCron: "*/5 * * * *"
  healthPort: 8080
  # Per-connector SFTP secrets as a JSON string (see worker/README.md).
  sftpSecrets: "{}"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Optional persistent volume for ingest state (recommended so restarts don't
  # re-ingest everything). When false, state lives in an emptyDir.
  persistence:
    enabled: false
    size: 1Gi
    storageClass: ""
  # Optional NFS/network share mount the worker reads from.
  extraVolumes: []
  extraVolumeMounts: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Ingress (TLS) for the portal. Requires an ingress controller + TLS secret
# (cert-manager or manually created).
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    # cert-manager.io/cluster-issuer: "your-issuer"
    # --- Rate limiting (ingress-nginx) ---------------------------------------
    # Requests/second and requests/minute per client IP; connections per IP.
    # Excess requests receive HTTP 429.
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-rpm: "300"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # Burst multiplier applied to the limits above.
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"
    # --- IP allowlist (optional) ---------------------------------------------
    # Uncomment and set CIDRs to restrict access to known networks. Leave it
    # out to allow all sources. Comma-separated list of CIDRs.
    # nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8,203.0.113.0/24"
  host: data.your-company.com
  tlsSecretName: gridwire-portal-tls

