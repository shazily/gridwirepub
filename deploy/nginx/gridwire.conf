# Gridwire portal — reverse proxy example (Nginx)
#
# Terminates TLS and forwards to the portal container on 127.0.0.1:3000.
# Copy to /etc/nginx/conf.d/gridwire.conf, set your domain + certs, then:
#   nginx -t && systemctl reload nginx
#
# For automatic certificates use Traefik or Caddy instead (see DEPLOYMENT.md §5).

# --- Rate limiting (http context) -------------------------------------------
# These directives MUST live in the http{} block (e.g. /etc/nginx/nginx.conf),
# NOT inside a server{} block. They are shown here for reference — move them up
# if your nginx.conf does not already define them.
#
#   # Client IP as seen behind an upstream proxy/LB (uses X-Forwarded-For).
#   # If nginx is the edge, use $binary_remote_addr instead of $realip_remote.
#   limit_req_zone  $binary_remote_addr  zone=gridwire_api:10m   rate=10r/s;
#   limit_req_zone  $binary_remote_addr  zone=gridwire_web:10m   rate=30r/s;
#   limit_conn_zone $binary_remote_addr  zone=gridwire_conn:10m;
#
#   # --- IP allowlist (optional) ---------------------------------------------
#   # Default 0 (deny). List the CIDRs allowed to reach the API. When you don't
#   # want an allowlist, leave the map out and remove the `if` block below.
#   geo $gridwire_allowed {
#       default            0;
#       10.0.0.0/8         1;   # internal network
#       203.0.113.0/24     1;   # office egress — replace with real ranges
#   }


# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name data.your-company.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name data.your-company.com;

    # --- TLS -----------------------------------------------------------------
    ssl_certificate     /etc/ssl/certs/gridwire.crt;
    ssl_certificate_key /etc/ssl/private/gridwire.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- Hardening -----------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Spreadsheet uploads can be large
    client_max_body_size 100m;

    # --- Metrics: restrict to monitoring network (Bearer METRICS_TOKEN required) ---
    # Behind Cloudflare Tunnel, do not expose this path publicly — use a separate
    # internal tunnel hostname or IP allowlist for Prometheus scrapers only.
    location = /api/public/metrics {
        # allow 10.0.0.0/8; deny all;   # optionally restrict to your monitoring net
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- API: rate limited (+ optional IP allowlist) -------------------------
    location /api/ {
        # IP allowlist — enable together with the geo{} map above.
        # if ($gridwire_allowed = 0) { return 403; }

        limit_req      zone=gridwire_api burst=20 nodelay;
        limit_conn     gridwire_conn 20;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # --- Proxy to the portal (web app) ---------------------------------------
    location / {
        limit_req      zone=gridwire_web burst=40 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}

