# Gridwire portal — Kubernetes Ingress (TLS)
#
# Edit the host and the TLS secret name. This assumes an ingress controller
# (nginx-ingress, Traefik, etc.) and cert-manager (or a manually-created TLS
# secret) are installed. See DEPLOYMENT.md §5–6.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gridwire-portal
  annotations:
    # Large spreadsheet uploads
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    # Rate limiting per client IP (excess → HTTP 429)
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-rpm: "300"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"
    # Optional IP allowlist — restrict to known CIDRs (comma-separated)
    # nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8,203.0.113.0/24"
    # Uncomment if using cert-manager for automatic TLS:
    # cert-manager.io/cluster-issuer: "your-issuer"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - data.your-company.com
      secretName: gridwire-portal-tls
  rules:
    - host: data.your-company.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gridwire-portal
                port:
                  number: 80
