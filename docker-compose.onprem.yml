# Gridwire full on-premise stack — portal + worker + Postgres + GoTrue + PostgREST + Kong.
# No cloud services required. One command: .\scripts\deploy.ps1 up
#
# Prerequisites: Docker Desktop, PowerShell. Run .\scripts\bootstrap-onprem.ps1 first.

services:
  db:
    # Official Supabase Postgres — includes auth schema, roles, and extensions GoTrue expects.
    image: supabase/postgres:15.8.1.060
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRIDWIRE_DB_PORT:-54332}:5432"
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: "5432"
      POSTGRES_PORT: "5432"
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: postgres
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: "3600"
    volumes:
      - gridwire-db:/var/lib/postgresql/data
      - ./deploy/supabase/00-create-supabase-admin.sh:/docker-entrypoint-initdb.d/00-create-supabase-admin.sh:ro
      - ./deploy/supabase/zzz-set-role-passwords.sh:/docker-entrypoint-initdb.d/zzz-set-role-passwords.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 120s
    networks:
      - gridwire

  auth:
    image: supabase/gotrue:v2.167.0
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://127.0.0.1:3040}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL:-http://127.0.0.1:3020}
      GOTRUE_URI_ALLOW_LIST: ${SITE_URL:-http://127.0.0.1:3020}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      # Recovery / magic-link OTP lifetime (seconds). Keep short for security.
      GOTRUE_MAILER_OTP_EXP: ${GOTRUE_MAILER_OTP_EXP:-300}
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-true}
      GOTRUE_MAILER_EXTERNAL_HOSTS: ${SITE_URL:-http://127.0.0.1:3020},kong,localhost,127.0.0.1
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_FROM:-admin@gridwire.local}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Gridwire}
      GOTRUE_MFA_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - gridwire

  rest:
    image: postgrest/postgrest:v12.2.12
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
    networks:
      - gridwire

  kong:
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRIDWIRE_API_PORT:-3040}:8000"
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
    volumes:
      - ./deploy/supabase/kong.yml:/var/lib/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - gridwire

  portal:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-${SUPABASE_PUBLISHABLE_KEY}}
        VITE_DEPLOYMENT_MODE: onprem
        VITE_SHOW_MARKETING: ${VITE_SHOW_MARKETING:-false}
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
        VITE_GITHUB_REPO_URL: ${VITE_GITHUB_REPO_URL:-https://github.com/shazily/gridwirepub}
        VITE_INGEST_EMAIL_DOMAIN: ${VITE_INGEST_EMAIL_DOMAIN:-${INGEST_EMAIL_DOMAIN:-ingest.local}}
    image: gridwire-portal
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${GRIDWIRE_HOST_PORT:-3020}:3000"
    depends_on:
      kong:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "3000"
      DEPLOYMENT_MODE: onprem
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      WORKER_INGEST_TOKEN: ${WORKER_INGEST_TOKEN}
      METRICS_TOKEN: ${METRICS_TOKEN}
      API_RATE_LIMIT_PER_MIN: ${API_RATE_LIMIT_PER_MIN:-60}
      API_RATE_LIMIT_BURST: ${API_RATE_LIMIT_BURST:-20}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://127.0.0.1:3020}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: ${STORAGE_BUCKET:-gridwire}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-gridwire}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      STORAGE_REGION: us-east-1
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      CLAMAV_REQUIRED: ${CLAMAV_REQUIRED:-false}
      PDF_PARSE_ENABLED: ${PDF_PARSE_ENABLED:-true}
      PDF_PARSE_MOCK: ${PDF_PARSE_MOCK:-false}
      PDF_PARSE_MAX_PAGES: ${PDF_PARSE_MAX_PAGES:-30}
      PDF_PARSE_STRUCTURE_MAX_PAGES: ${PDF_PARSE_STRUCTURE_MAX_PAGES:-2}
      PDF_PARSE_STRUCTURE_MAX_CHARS: ${PDF_PARSE_STRUCTURE_MAX_CHARS:-8000}
      PDF_PARSE_STRUCTURE_LLM_TIMEOUT_MS: ${PDF_PARSE_STRUCTURE_LLM_TIMEOUT_MS:-45000}
      PDF_PARSE_MAX_BYTES: ${PDF_PARSE_MAX_BYTES:-26214400}
      PDF_PARSE_MAX_CONCURRENT_PER_ORG: ${PDF_PARSE_MAX_CONCURRENT_PER_ORG:-2}
      PDF_PARSE_LLM_TIMEOUT_MS: ${PDF_PARSE_LLM_TIMEOUT_MS:-120000}
      PDF_PARSE_STALE_MS: ${PDF_PARSE_STALE_MS:-900000}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      INBOUND_WEBHOOK_SECRET: ${INBOUND_WEBHOOK_SECRET}
      INGEST_EMAIL_DOMAIN: ${INGEST_EMAIL_DOMAIN:-ingest.local}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/public/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - gridwire
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-gridwire}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
    volumes:
      - gridwire-minio:/data
    networks:
      - gridwire

  worker:
    build: ./worker
    image: gridwire-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      portal:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      PORTAL_URL: http://portal:3000
      WORKER_INGEST_TOKEN: ${WORKER_INGEST_TOKEN}
      POLL_CRON: ${POLL_CRON:-*/5 * * * *}
      SFTP_SECRETS: ${SFTP_SECRETS:-{}}
      HEALTH_PORT: "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - worker-state:/data
      # Mount corporate NFS/Samba shares for connector ingestion, e.g.:
      # - /mnt/corporate/finance:/mnt/corporate/finance:ro
    networks:
      - gridwire
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    networks:
      - gridwire
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  gridwire:
    driver: bridge

volumes:
  gridwire-db:
  gridwire-minio:
  worker-state:
